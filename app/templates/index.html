<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Design Architect Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        /* ── Reset & Base ─────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #242736;
            --border: #2e3144;
            --text: #e4e4e7;
            --text-dim: #9395a5;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --agent: #10b981;
            --user-bubble: #6366f1;
            --agent-bubble: #1e2235;
            --radius: 12px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ───────────────────────────────────────────── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header p {
            font-size: 12px;
            color: var(--text-dim);
        }

        .header-badge {
            margin-left: auto;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--agent);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--agent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Chat area ────────────────────────────────────────── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 720px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.agent { align-self: flex-start; }
        .message.user  { align-self: flex-end; flex-direction: row-reverse; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.agent .avatar {
            background: linear-gradient(135deg, var(--agent), #059669);
        }

        .message.user .avatar {
            background: linear-gradient(135deg, var(--accent), #a855f7);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .message.agent .bubble {
            background: var(--agent-bubble);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border-top-right-radius: 4px;
        }

        .bubble strong { color: #f1f5f9; }

        /* Markdown-style table in summary */
        .bubble table {
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 13px;
            width: 100%;
        }
        .bubble th, .bubble td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
        }
        .bubble th {
            background: var(--surface-2);
        }

        /* ── Options buttons ──────────────────────────────────── */
        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .option-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font);
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .option-btn:active {
            transform: translateY(0);
        }

        /* ── Input bar ────────────────────────────────────────── */
        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

        .input-bar input {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-bar input:focus {
            border-color: var(--accent);
        }

        .input-bar input::placeholder {
            color: var(--text-dim);
        }

        .input-bar input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .new-session-btn {
            background: var(--agent);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--font);
            font-weight: 600;
            transition: background 0.2s;
        }

        .new-session-btn:hover { background: #059669; }

        /* ── Diagram ──────────────────────────────────────────── */
        .diagram-container {
            background: #ffffff;
            border-radius: var(--radius);
            padding: 24px;
            margin-top: 16px;
            overflow-x: auto;
        }

        .diagram-container svg {
            max-width: 100%;
            height: auto;
        }

        /* ── Typing indicator ─────────────────────────────────── */
        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Download button ──────────────────────────────────── */
        .download-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font);
            margin-top: 8px;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* ── Progress bar ─────────────────────────────────────── */
        .progress-bar {
            height: 3px;
            background: var(--surface-2);
            flex-shrink: 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--agent));
            transition: width 0.5s ease;
        }

        /* ── Scrollbar ────────────────────────────────────────── */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-icon">🏗️</div>
        <div>
            <h1>System Design Architect</h1>
            <p>AI-powered architecture diagram generator</p>
        </div>
        <div class="header-badge">Agent Active</div>
    </div>

    <!-- Progress -->
    <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <!-- Chat -->
    <div class="chat-container" id="chat"></div>

    <!-- Input -->
    <div class="input-bar" id="inputBar">
        <input
            type="text"
            id="userInput"
            placeholder="Type your answer..."
            autocomplete="off"
        />
        <button class="send-btn" id="sendBtn" title="Send">&#9654;</button>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────
        let sessionId = null;
        let currentStep = 0;
        const totalSteps = 9;
        let waitingForInput = false;
        let isComplete = false;

        const chat     = document.getElementById('chat');
        const input    = document.getElementById('userInput');
        const sendBtn  = document.getElementById('sendBtn');
        const progress = document.getElementById('progress');
        const inputBar = document.getElementById('inputBar');

        // ── Helpers ────────────────────────────────────────────

        function updateProgress() {
            const pct = Math.min(100, Math.round((currentStep / totalSteps) * 100));
            progress.style.width = pct + '%';
        }

        function scrollDown() {
            requestAnimationFrame(() => {
                chat.scrollTop = chat.scrollHeight;
            });
        }

        function parseMarkdown(text) {
            // Very lightweight markdown-to-HTML
            let html = text
                .replace(/^## (.+)$/gm, '<h3 style="margin:8px 0 4px;">$1</h3>')
                .replace(/^### (.+)$/gm, '<h4 style="margin:8px 0 4px;">$1</h4>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br/>');

            // Convert markdown tables
            const tableRegex = /(\|.+\|<br\/>)(\|[-| ]+\|<br\/>)((?:\|.+\|<br\/>?)+)/g;
            html = html.replace(tableRegex, (match, headerRow, sepRow, bodyRows) => {
                const parseRow = (row) => {
                    return row.replace(/<br\/>/g, '').split('|').filter(c => c.trim()).map(c => c.trim());
                };
                const headers = parseRow(headerRow);
                const rows = bodyRows.split('<br/>').filter(r => r.includes('|')).map(parseRow);
                let table = '<table><thead><tr>';
                headers.forEach(h => table += `<th>${h}</th>`);
                table += '</tr></thead><tbody>';
                rows.forEach(r => {
                    table += '<tr>';
                    r.forEach(c => table += `<td>${c}</td>`);
                    table += '</tr>';
                });
                table += '</tbody></table>';
                return table;
            });

            // Convert list items
            html = html.replace(/^- (.+)/gm, '&bull; $1');

            return html;
        }

        function addMessage(role, text, options, diagram) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'agent' ? '🤖' : '👤';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            if (text) {
                const textDiv = document.createElement('div');
                textDiv.innerHTML = parseMarkdown(text);
                bubble.appendChild(textDiv);
            }

            if (options && options.length > 0) {
                const optContainer = document.createElement('div');
                optContainer.className = 'options-container';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.addEventListener('click', () => {
                        if (!waitingForInput) return;
                        sendAnswer(opt);
                        // Disable all option buttons
                        optContainer.querySelectorAll('.option-btn').forEach(b => {
                            b.disabled = true;
                            b.style.opacity = '0.5';
                            b.style.cursor = 'default';
                        });
                        btn.style.opacity = '1';
                        btn.style.background = 'var(--accent)';
                        btn.style.borderColor = 'var(--accent)';
                    });
                    optContainer.appendChild(btn);
                });
                bubble.appendChild(optContainer);
            }

            if (diagram) {
                const diagramDiv = document.createElement('div');
                diagramDiv.className = 'diagram-container';
                const diagramId = 'mermaid-' + Date.now();
                diagramDiv.innerHTML = `<pre class="mermaid">${diagram}</pre>`;
                bubble.appendChild(diagramDiv);

                // Download buttons
                const dlDiv = document.createElement('div');
                dlDiv.style.display = 'flex';
                dlDiv.style.gap = '8px';

                const svgBtn = document.createElement('button');
                svgBtn.className = 'download-btn';
                svgBtn.textContent = '⬇ Download SVG';
                svgBtn.addEventListener('click', () => downloadSVG(diagramDiv));
                dlDiv.appendChild(svgBtn);

                const codeBtn = document.createElement('button');
                codeBtn.className = 'download-btn';
                codeBtn.textContent = '📋 Copy Mermaid Code';
                codeBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(diagram);
                    codeBtn.textContent = '✓ Copied!';
                    setTimeout(() => codeBtn.textContent = '📋 Copy Mermaid Code', 2000);
                });
                dlDiv.appendChild(codeBtn);

                bubble.appendChild(dlDiv);
            }

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chat.appendChild(msg);
            scrollDown();

            // Render mermaid
            if (diagram) {
                mermaid.run();
            }
        }

        function addTyping() {
            const msg = document.createElement('div');
            msg.className = 'message agent';
            msg.id = 'typing';
            msg.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chat.appendChild(msg);
            scrollDown();
        }

        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function downloadSVG(container) {
            const svg = container.querySelector('svg');
            if (!svg) return;
            const data = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([data], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'system-design.svg';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ── API calls ──────────────────────────────────────────

        async function startSession() {
            isComplete = false;
            input.disabled = false;
            addTyping();
            const res = await fetch('/api/session', { method: 'POST' });
            const data = await res.json();
            removeTyping();
            sessionId = data.text.match(/Session `(\w+)` created/)?.[1] || null;
            currentStep = 1;
            updateProgress();
            waitingForInput = true;
            addMessage('agent', data.text, data.options, data.diagram);
            if (data.is_free_text) {
                input.focus();
            }
        }

        async function sendAnswer(answer) {
            if (!sessionId || !waitingForInput) return;
            waitingForInput = false;

            addMessage('user', answer);
            input.value = '';
            input.disabled = true;

            currentStep++;
            updateProgress();

            addTyping();

            // Small delay to simulate agent thinking
            await new Promise(r => setTimeout(r, 600));

            const res = await fetch('/api/respond', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, answer }),
            });
            const data = await res.json();
            removeTyping();

            addMessage('agent', data.text, data.options, data.diagram);

            if (data.is_complete) {
                isComplete = true;
                input.disabled = true;
                // Show a "New Session" button
                inputBar.innerHTML = `
                    <button class="new-session-btn" onclick="resetSession()">
                        🔄 Start New Design Session
                    </button>
                `;
            } else {
                input.disabled = false;
                waitingForInput = true;
                if (data.is_free_text) {
                    input.focus();
                }
            }
        }

        function resetSession() {
            chat.innerHTML = '';
            sessionId = null;
            currentStep = 0;
            updateProgress();
            inputBar.innerHTML = `
                <input type="text" id="userInput" placeholder="Type your answer..." autocomplete="off" />
                <button class="send-btn" id="sendBtn" title="Send">&#9654;</button>
            `;
            // Re-bind references
            bindInputEvents();
            startSession();
        }

        function bindInputEvents() {
            const inp = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');

            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && inp.value.trim()) {
                    sendAnswer(inp.value.trim());
                }
            });

            btn.addEventListener('click', () => {
                if (inp.value.trim()) {
                    sendAnswer(inp.value.trim());
                }
            });
        }

        // ── Init ───────────────────────────────────────────────
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis',
            },
        });

        bindInputEvents();
        startSession();
    </script>
</body>
</html>
